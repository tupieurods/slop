name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/SlopChat.slnx

      - name: Build
        run: dotnet build src/SlopChat.slnx --no-restore -c Release

      - name: Publish SlopChat
        run: dotnet publish src/SlopChat/SlopChat.csproj --no-restore -c Release -o publish/slopchat

      - name: Publish SlopMcp
        run: dotnet publish src/SlopMcp/SlopMcp.csproj --no-restore -c Release -o publish/slopmcp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slopchat
          path: publish/
