name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Publish self-contained
        run: dotnet publish src/SlopChat/SlopChat.csproj -c Release -r linux-x64 --self-contained -o publish

      - name: Generate .env
        run: |
          cat > publish/.env <<EOF
          SLOP_TELEGRAM_TOKEN=${{ secrets.SLOP_TELEGRAM_TOKEN }}
          SLOP_OPENROUTER_KEY=${{ secrets.SLOP_OPENROUTER_KEY }}
          SLOP_ADMIN_ID=${{ secrets.SLOP_ADMIN_ID }}
          SLOP_ALLOWED_CHATS=${{ secrets.SLOP_ALLOWED_CHATS }}
          EOF

      - name: Pack artifact
        run: tar -czf slopchat.tar.gz -C publish .

      - name: Deploy to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "slopchat.tar.gz"
          target: "/tmp"

      - name: Install and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo systemctl stop slopchat || true
            sudo mkdir -p /opt/slopchat
            sudo tar -xzf /tmp/slopchat.tar.gz -C /opt/slopchat
            sudo chmod +x /opt/slopchat/SlopChat
            rm /tmp/slopchat.tar.gz
            sudo systemctl start slopchat
