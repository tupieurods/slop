name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Publish self-contained
        run: dotnet publish src/SlopChat/SlopChat.csproj -c Release -r linux-x64 --self-contained -o publish

      - name: Pack artifact
        run: tar -czf slopchat.tar.gz -C publish .

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy to droplet
        run: |
          doctl compute ssh ${{ secrets.DROPLET_NAME }} --access-token ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }} -- bash -c "cat > /tmp/slopchat.tar.gz" < slopchat.tar.gz
          doctl compute ssh ${{ secrets.DROPLET_NAME }} --access-token ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }} -- bash -c "
            sudo systemctl stop slopchat || true
            sudo mkdir -p /opt/slopchat
            sudo tar -xzf /tmp/slopchat.tar.gz -C /opt/slopchat
            sudo chmod +x /opt/slopchat/SlopChat
            rm /tmp/slopchat.tar.gz
            sudo systemctl start slopchat
          "
