name: Deploy

on:
  push:
    branches: [master]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/slopchat

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/docker-compose.yml"
          target: "/opt/slopchat"
          strip_components: 1

      - name: Deploy container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_NAME
          script: |
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export SLOP_TELEGRAM_TOKEN="${{ secrets.SLOP_TELEGRAM_TOKEN }}"
            export SLOP_OPENROUTER_KEY="${{ secrets.SLOP_OPENROUTER_KEY }}"
            export SLOP_ADMIN_ID="${{ secrets.SLOP_ADMIN_ID }}"
            export SLOP_ALLOWED_CHATS="${{ secrets.SLOP_ALLOWED_CHATS }}"
            cd /opt/slopchat
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
