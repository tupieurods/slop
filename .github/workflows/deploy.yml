name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE_CHAT: ${{ secrets.DOCKERHUB_USERNAME }}/slopchat
  IMAGE_MCP: ${{ secrets.DOCKERHUB_USERNAME }}/slopmcp

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push SlopChat
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_CHAT }}:${{ github.sha }}
            ${{ github.ref == 'refs/heads/master' && format('{0}:latest', env.IMAGE_CHAT) || '' }}
          cache-from: type=gha,scope=slopchat
          cache-to: type=gha,mode=max,scope=slopchat

      - name: Build and push SlopMcp
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: |
            ${{ env.IMAGE_MCP }}:${{ github.sha }}
            ${{ github.ref == 'refs/heads/master' && format('{0}:latest', env.IMAGE_MCP) || '' }}
          cache-from: type=gha,scope=slopmcp
          cache-to: type=gha,mode=max,scope=slopmcp

      - name: Copy deploy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/"
          target: "/opt/slopchat"
          strip_components: 1

      - name: Deploy containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export SLOP_TELEGRAM_TOKEN="${{ secrets.SLOP_TELEGRAM_TOKEN }}"
            export SLOP_OPENROUTER_KEY="${{ secrets.SLOP_OPENROUTER_KEY }}"
            export SLOP_ADMIN_ID="${{ secrets.SLOP_ADMIN_ID }}"
            export SLOP_ALLOWED_CHATS="${{ secrets.SLOP_ALLOWED_CHATS }}"
            cd /opt/slopchat
            sed -i "s|:latest|:${{ github.sha }}|g" docker-compose.yml
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
